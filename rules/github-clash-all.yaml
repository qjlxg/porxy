  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
      - gfw
    ipcidr:
      - 240.0.0.0/4
    domain:
      - +.google.com
      - +.facebook.com
      - +.youtube.com
  nameserver-policy:
    geosite:cn,private,apple:
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
    www.baidu.com,+.google.cn: [223.5.5.5, https://dns.alidns.com/dns-query]
    rule-set:иҮӘе®ҡд№үе№ҝе‘ҠзҷҪеҗҚеҚ•: [223.5.5.5, https://dns.alidns.com/dns-query]
